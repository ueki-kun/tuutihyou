<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目標達成！成績シミュレーター</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #ffcc00;
            --bg-color: #f0f4f8;
            --text-color: #333;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: var(--primary-color); font-size: 1.5rem; }
        .input-group { margin: 1.5rem 0; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.02); }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .success { background: #e7f3ff; border: 1px solid var(--primary-color); }
        .highlight { color: #e91e63; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 成績UPシミュレーター</h1>
    <p>次のテストで「4」を目指そう！</p>
    
    <div class="input-group">
        <label for="midterm">中間テストの点数 (0-100)</label>
        <input type="number" id="midterm" placeholder="例: 75">
    </div>

    <button onclick="calculate()">目標を計算する！</button>

    <div id="result">
        <p id="message"></p>
    </div>
</div>

<script>
    function calculate() {
        const midterm = parseFloat(document.getElementById('midterm').value);
        const resultDiv = document.getElementById('result');
        const messageP = document.getElementById('message');

        if (isNaN(midterm) || midterm < 0 || midterm > 100) {
            alert("正しい点数を入力してね！");
            return;
        }

        // 評定「4」の目安を平均80点と仮定 (中間+期末)/2 = 80
        // つまり 合計160点必要
        const targetTotal = 160;
        const required = targetTotal - midterm;

        resultDiv.style.display = "block";
        resultDiv.className = "success";

        if (required <= 100) {
            const finalScore = required > 0 ? required : 0;
            messageP.innerHTML = `
                中間テストは <span class="highlight">${midterm}点</span> だったね！<br><br>
                期末テストで <span class="highlight">${finalScore}点</span> 以上取れば、<br>
                成績 <span class="highlight">「4」</span> がぐっと近づくよ！<br><br>
                君なら絶対にできる。応援してるよ！
            `;
        } else {
            messageP.innerHTML = `
                目標まであと少し！期末で高得点を狙いつつ、<br>
                提出物や授業態度でプラスアルファを狙おう！<br>
                一歩ずつの積み重ねが大事だよ。
            `;
        }
    }
</script>

</body>
</html>
